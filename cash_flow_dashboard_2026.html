<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Flow 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c0f;--bg2:#111418;--bg3:#181d24;--border:#1e2530;--border2:#252e3a;
  --green:#00e87a;--green-dim:#00e87a20;--red:#ff3d5a;--red-dim:#ff3d5a20;
  --yellow:#ffc044;--yellow-dim:#ffc04420;--blue:#4da6ff;--blue-dim:#4da6ff18;
  --text:#eef2f7;--text2:#8a96a8;--text3:#4a5568;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:28px 24px;font-size:13px}
.loading{display:flex;align-items:center;justify-content:center;height:100vh;font-family:'DM Mono',monospace;color:var(--text3);font-size:14px}
.header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.header h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.5px}
.header p{color:var(--text3);font-size:11px;margin-top:4px;font-family:'DM Mono',monospace}
.tc-badge{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 14px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);white-space:nowrap}
.tc-badge span{color:var(--blue);font-weight:500}
.last-updated{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:4px;text-align:right}
.month-tabs{display:flex;gap:4px;margin-bottom:22px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content}
.mtab{padding:6px 14px;border-radius:7px;font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;color:var(--text3);transition:all .15s;border:none;background:none}
.mtab:hover{color:var(--text2)}
.mtab.active{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.mtab.proj{opacity:.4;cursor:default}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.g::before{background:var(--green)}.kpi.r::before{background:var(--red)}.kpi.b::before{background:var(--blue)}.kpi.y::before{background:var(--yellow)}
.kpi-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;font-family:'DM Mono',monospace}
.kpi-val{font-family:'Syne',sans-serif;font-size:19px;font-weight:700}
.kpi-val.g{color:var(--green)}.kpi-val.r{color:var(--red)}.kpi-val.b{color:var(--blue)}.kpi-val.y{color:var(--yellow)}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:5px;font-family:'DM Mono',monospace}
.debt-tracker{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px}
.debt-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.debt-title{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.debt-badge{background:var(--green-dim);border:1px solid var(--green);border-radius:6px;padding:3px 10px;font-size:10px;font-family:'DM Mono',monospace;color:var(--green)}
.debt-numbers{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.dn-label{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.dn-val{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.prog-label{display:flex;justify-content:space-between;margin-bottom:6px;font-size:10px;font-family:'DM Mono',monospace;color:var(--text3)}
.prog-bg{background:var(--border);border-radius:99px;height:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--green));transition:width .5s}
.months-row{display:flex;gap:8px;margin-top:14px}
.mpill{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 8px;text-align:center}
.mpill.done{border-color:var(--green);background:var(--green-dim)}
.mpill.active{border-color:var(--blue);background:var(--blue-dim)}
.mpill.target{border-color:var(--yellow);background:var(--yellow-dim)}
.mp-label{font-size:9px;font-family:'DM Mono',monospace;color:var(--text3);margin-bottom:4px}
.mp-val{font-size:11px;font-weight:500;font-family:'DM Mono',monospace}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-title{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px}
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:110px}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.bars{display:flex;gap:2px;align-items:flex-end}
.bar{width:13px;border-radius:3px 3px 0 0}
.bar.ing{background:var(--green)}.bar.gas{background:var(--red)}
.bar-lbl{font-size:9px;color:var(--text3);margin-top:5px;font-family:'DM Mono',monospace}
.bar-lbl.sel{color:var(--blue)}
.chart-legend{display:flex;gap:14px;margin-top:10px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.leg-dot{width:8px;height:8px;border-radius:2px}
svg.line{width:100%;height:110px}
.sem-table,.res-table{width:100%;border-collapse:collapse}
.sem-table th,.res-table th{font-size:9px;font-family:'DM Mono',monospace;color:var(--text3);text-align:left;padding:0 8px 10px;text-transform:uppercase;letter-spacing:.5px}
.sem-table td{padding:9px 8px;border-top:1px solid var(--border);font-size:12px}
.res-table td{padding:7px 8px;border-top:1px solid var(--border);font-size:11px;font-family:'DM Mono',monospace}
.res-table tr.sel-row td{background:var(--blue-dim)}
.res-table tr.proj-row td{color:var(--text3)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px}
.dot.g{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot.y{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
.dot.r{background:var(--red);box-shadow:0 0 6px var(--red)}
.cat-cell{display:flex;align-items:center}
.mini-bar-bg{background:var(--border);border-radius:3px;height:3px;margin-top:4px}
.mini-bar-fill{height:3px;border-radius:3px}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-family:'DM Mono',monospace}
.tag.ok{background:var(--green-dim);color:var(--green);border:1px solid #00e87a44}
.tag.def{background:var(--red-dim);color:var(--red);border:1px solid #ff3d5a44}
.tag.proj{background:var(--bg3);color:var(--text3);border:1px solid var(--border2)}
.refresh-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 12px;font-size:10px;font-family:'DM Mono',monospace;color:var(--text2);cursor:pointer;transition:all .15s}
.refresh-btn:hover{border-color:var(--blue);color:var(--blue)}
</style>
</head>
<body>
<div id="loadingScreen" class="loading">Loading data from Google Sheets...</div>
<div id="app" style="display:none">
  <div class="header">
    <div>
      <h1>💰 Cash Flow 2026</h1>
      <p>Real data: auto-detected · Projection: remaining months</p>
    </div>
    <div style="text-align:right">
      <div class="tc-badge" id="tcBadge">TC BNA <span id="tcVal">...</span> &nbsp;·&nbsp; USD 19.200 → <span id="usdArsVal">...</span> &nbsp;·&nbsp; <button class="refresh-btn" onclick="loadData()">↻ Refresh</button></div>
      <div class="last-updated" id="lastUpdated"></div>
    </div>
  </div>
  <div class="month-tabs" id="tabs"></div>
  <div class="kpi-row" id="kpis"></div>
  <div class="debt-tracker" id="debtTracker"></div>
  <div class="grid-2">
    <div class="card">
      <div class="card-title">Income vs Spending — full year</div>
      <div class="bar-chart" id="barChart"></div>
      <div class="chart-legend">
        <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>Income</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>Spending</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Accumulated balance</div>
      <svg class="line" id="lineChart" viewBox="0 0 400 110"></svg>
    </div>
  </div>
  <div class="grid-2">
    <div class="card">
      <div class="card-title">Traffic light — variable expenses</div>
      <div id="semaforo"></div>
    </div>
    <div class="card">
      <div class="card-title">Monthly summary</div>
      <div id="resumen"></div>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbySgM0xDJC0Hpk8dLBCpFJS_O6qi2MSza2zn8jUOD3tpQeFnyzd5K47jx7uEkw7G6AScA/exec';
const MESES   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const USD_MO  = 3400;
let   USD_SAV = 19200; // overridden by live savings data
const DEBT_FULL = 46888320;
const DEBT_NEG  = 35909756;
let   DEBT      = DEBT_FULL;
let   debtMode  = 'full'; // 'full' or 'neg'

let sel = 0;
let D   = {};
let realMonths = [];
let currentTC  = 1460;

const fmt  = n => '$' + Math.round(Math.abs(n||0)).toLocaleString('es-AR');
const fmtS = n => (n>=0?'+':'-') + '$' + Math.round(Math.abs(n||0)).toLocaleString('es-AR');

async function loadData() {
  try {
    document.getElementById('lastUpdated').textContent = 'Loading...';
    const res  = await fetch(API_URL);
    const json = await res.json();
    D = json;

    // Auto-detect real months: income > 0 AND spending > 0
    realMonths = [];
    for (var i = 0; i < 12; i++) {
      if (D.entert[i] > 0) realMonths.push(i);
    }

    // Current TC = last real month's buy rate
    const lastRealIdx = realMonths[realMonths.length - 1];
    currentTC = D.rates ? D.rates[lastRealIdx] : 1460;

    // Live savings: last non-zero value from savings array
    if (D.savings) {
      var lastSaving = 0;
      for (var s = 0; s < D.savings.length; s++) {
        if (D.savings[s] > 0) lastSaving = D.savings[s];
      }
      if (lastSaving > 0) USD_SAV = lastSaving;
    }

    const usdArs = USD_SAV * currentTC;
    const surplus = 500000 + USD_MO * currentTC;

    // Update TC badge
    document.getElementById('tcVal').textContent = '$' + Math.round(currentTC).toLocaleString('es-AR');
    document.getElementById('usdArsVal').textContent = fmt(usdArs) + ' (USD ' + USD_SAV.toLocaleString('es-AR') + ')';

    // Default selected month = last real month
    sel = lastRealIdx;

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('lastUpdated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
    render();
  } catch(e) {
    document.getElementById('loadingScreen').textContent = 'Error loading data. ' + e.message;
    console.error(e);
  }
}

function render() {
  renderTabs(); renderKPIs(); renderDebtTracker();
  renderBarChart(); renderLineChart(); renderSemaforo(); renderResumen();
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = MESES.map((m,i) => {
    const isReal = realMonths.includes(i);
    return `<button class="mtab ${i===sel?'active':''} ${!isReal?'proj':''}" 
      onclick="${isReal?`pick(${i})`:''}">${m}</button>`;
  }).join('');
}

function pick(i) { sel=i; renderTabs(); renderKPIs(); renderSemaforo(); renderResumen(); }

function renderKPIs() {
  const tc     = D.rates ? D.rates[sel] : currentTC;
  const net    = D.ingresos[sel] - D.gastos[sel];
  const conUsd = net + USD_MO * tc;
  document.getElementById('kpis').innerHTML = `
    <div class="kpi g"><div class="kpi-label">Income</div><div class="kpi-val g">${fmt(D.ingresos[sel])}</div><div class="kpi-sub">${MESES[sel]} · +${fmt(USD_MO*tc)} USD</div></div>
    <div class="kpi r"><div class="kpi-label">Total Spending</div><div class="kpi-val r">${fmt(D.gastos[sel])}</div><div class="kpi-sub">${Math.round(D.gastos[sel]/D.ingresos[sel]*100)}% of income</div></div>
    <div class="kpi ${net>=0?'g':'r'}"><div class="kpi-label">Net Month</div><div class="kpi-val ${net>=0?'g':'r'}">${fmtS(net)}</div><div class="kpi-sub">${net>=0?'Surplus':'Deficit'}</div></div>
    <div class="kpi b"><div class="kpi-label">Surplus w/USD</div><div class="kpi-val b">${fmtS(conUsd)}</div><div class="kpi-sub">incl. USD ${USD_MO.toLocaleString()}/mo @ $${Math.round(tc).toLocaleString('es-AR')}</div></div>`;
}

function toggleDebt(mode) {
  debtMode = mode;
  DEBT = mode === 'neg' ? DEBT_NEG : DEBT_FULL;
  renderDebtTracker();
}

function renderDebtTracker() {
  const tc      = currentTC;
  const usdArs  = USD_SAV * tc;
  const surplus = 500000 + USD_MO * tc;
  const gap     = DEBT - usdArs;
  const pct     = Math.min(100, Math.round(usdArs/DEBT*100));
  const proj    = [
    {label:'Today (USD)', val:usdArs,             cls:'done'},
    {label:'Jul-26',      val:usdArs+surplus,      cls:'active'},
    {label:'Aug-26',      val:usdArs+surplus*2,    cls:''},
    {label:'Sep-26',      val:usdArs+surplus*3,    cls:'target'},
  ];
  document.getElementById('debtTracker').innerHTML = `
    <div class="debt-header">
      <div class="debt-title">🎯 Debt tracker · target Sep 30, 2026</div>
      <div style="display:flex;gap:6px;align-items:center">
        <button onclick="toggleDebt('neg')" style="padding:4px 10px;border-radius:6px;font-size:10px;font-family:'DM Mono',monospace;cursor:pointer;border:1px solid ${debtMode==='neg'?'var(--green)':'var(--border2)'};background:${debtMode==='neg'?'var(--green-dim)':'var(--bg3)'};color:${debtMode==='neg'?'var(--green)':'var(--text3)'}">✂️ With negotiation</button>
        <button onclick="toggleDebt('full')" style="padding:4px 10px;border-radius:6px;font-size:10px;font-family:'DM Mono',monospace;cursor:pointer;border:1px solid ${debtMode==='full'?'var(--red)':'var(--border2)'};background:${debtMode==='full'?'var(--red-dim)':'var(--bg3)'};color:${debtMode==='full'?'var(--red)':'var(--text3)'}">💀 Without negotiation</button>
        <div class="debt-badge">Goal: ${fmt(DEBT)}</div>
      </div>
    </div>
    <div class="debt-numbers">
      <div><div class="dn-label">Total Debt</div><div class="dn-val" style="color:var(--red)">${fmt(DEBT)}</div></div>
      <div><div class="dn-label">USD Available</div><div class="dn-val" style="color:var(--blue)">${fmt(usdArs)}</div></div>
      <div><div class="dn-label">Gap to Fill</div><div class="dn-val" style="color:${gap<=0?'var(--green)':'var(--yellow)'}">${gap<=0?'✓ Covered!':fmt(gap)}</div></div>
      <div><div class="dn-label">Monthly Surplus</div><div class="dn-val" style="color:var(--green)">${fmt(surplus)}</div></div>
    </div>
    <div class="prog-label"><span>Progress</span><span style="color:var(--blue)">${pct}% covered with USD savings</span></div>
    <div class="prog-bg"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="months-row">${proj.map(p => {
      const pp = Math.min(100, Math.round(p.val/DEBT*100));
      const ok = p.val >= DEBT;
      return `<div class="mpill ${p.cls}">
        <div class="mp-label">${p.label}</div>
        <div class="mp-val" style="color:${ok?'var(--green)':p.cls==='done'?'var(--blue)':'var(--text2)'}">${fmt(p.val)}</div>
        <div style="font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:3px">${pp}%${ok?' ✓':''}</div>
      </div>`;
    }).join('')}</div>`;
}

function renderBarChart() {
  const maxV = Math.max(...D.ingresos, ...D.gastos);
  document.getElementById('barChart').innerHTML = MESES.map((_,i) => {
    const hI  = Math.round(D.ingresos[i]/maxV*100);
    const hG  = Math.round(D.gastos[i]/maxV*100);
    const isR = realMonths.includes(i);
    return `<div class="bar-group"><div class="bars">
      <div class="bar ing" style="height:${hI}px;opacity:${isR?1:.3}" title="${MESES[i]} Income: ${fmt(D.ingresos[i])}"></div>
      <div class="bar gas" style="height:${hG}px;opacity:${isR?1:.3}" title="${MESES[i]} Spending: ${fmt(D.gastos[i])}"></div>
    </div><div class="bar-lbl ${i===sel?'sel':''}">${MESES[i]}</div></div>`;
  }).join('');
}

function renderLineChart() {
  const W=400,H=110,P=28;
  const vals = D.net;
  const minV = Math.min(...vals), maxV = Math.max(...vals), range = maxV-minV||1;
  const xs = vals.map((_,i) => P+(i/(vals.length-1))*(W-2*P));
  const ys = vals.map(v => P+(1-(v-minV)/range)*(H-2*P));
  const zY = P+(1-(0-minV)/range)*(H-2*P);
  const path = xs.map((x,i) => (i===0?'M':'L')+x.toFixed(1)+','+ys[i].toFixed(1)).join(' ');
  const area = `M${xs[0].toFixed(1)},${zY.toFixed(1)} `+xs.map((x,i)=>`L${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ')+` L${xs[xs.length-1].toFixed(1)},${zY.toFixed(1)} Z`;
  const dots = vals.map((v,i) => `<circle cx="${xs[i].toFixed(1)}" cy="${ys[i].toFixed(1)}" r="${i===sel?5:3}" fill="${v>=0?'var(--green)':'var(--red)'}" opacity="${realMonths.includes(i)?1:.4}" stroke="var(--bg2)" stroke-width="1.5"/>`).join('');
  const lbls = MESES.map((l,i) => `<text x="${xs[i].toFixed(1)}" y="${H-1}" text-anchor="middle" font-size="8" fill="${i===sel?'var(--blue)':'var(--text3)'}" font-family="'DM Mono',monospace">${l}</text>`).join('');
  document.getElementById('lineChart').innerHTML = `
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(--green)" stop-opacity=".25"/>
      <stop offset="100%" stop-color="var(--green)" stop-opacity=".02"/>
    </linearGradient></defs>
    <line x1="${P}" y1="${zY.toFixed(1)}" x2="${W-P}" y2="${zY.toFixed(1)}" stroke="var(--border2)" stroke-width="1" stroke-dasharray="3,3"/>
    <path d="${area}" fill="url(#ag)"/>
    <path d="${path}" fill="none" stroke="var(--green)" stroke-width="1.5"/>
    ${dots}${lbls}`;
}

function renderSemaforo() {
  const isR = realMonths.includes(sel);
  if (!isR) { document.getElementById('semaforo').innerHTML='<div style="color:var(--text3);font-size:11px;font-family:\'DM Mono\',monospace;text-align:center;padding:20px">No data for this month</div>'; return; }
  const cats = [
    {n:'Entertainment & Dining', v:D.entert,  g:400000, y:600000},
    {n:'Groceries & Home',       v:D.grocer,  g:200000, y:300000},
    {n:'Shopping & Tech',        v:D.shop,    g:100000, y:200000},
    {n:'Personal Care & Health', v:D.health,  g:150000, y:250000},
    {n:'Transport',              v:D.transp,  g:80000,  y:130000},
  ];
  const maxVal = Math.max(...cats.map(c=>c.v[sel]), 1);
  const rows = cats.map(cat => {
    const v=cat.v[sel], g=cat.g, y=cat.y;
    let cls='g'; if(v>y) cls='r'; else if(v>g) cls='y';
    const bp  = Math.round(v/maxVal*100);
    const bc  = cls==='g'?'var(--green)':cls==='y'?'var(--yellow)':'var(--red)';
    return `<tr>
      <td><div class="cat-cell"><span class="dot ${cls}"></span>${cat.n}</div>
        <div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${bp}%;background:${bc}"></div></div></td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-weight:500">${fmt(v)}</td>
      <td style="text-align:right;font-size:9px;color:var(--text3);font-family:'DM Mono',monospace">limit ${fmt(g)}</td>
    </tr>`;
  }).join('');
  document.getElementById('semaforo').innerHTML = `
    <table class="sem-table">
      <thead><tr><th>Category</th><th style="text-align:right">Amount</th><th style="text-align:right">Green limit</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:10px;font-size:9px;color:var(--text3);font-family:'DM Mono',monospace">🟢 under limit · 🟡 up to +50% · 🔴 exceeds limit</div>`;
}

function renderResumen() {
  const rows = MESES.map((m,i) => {
    const net = D.ingresos[i] - D.gastos[i];
    const pct = D.ingresos[i] > 0 ? D.gastos[i]/D.ingresos[i] : 0;
    const isR = realMonths.includes(i);
    const tag = !isR ? '<span class="tag proj">Proj</span>' : net>=0 ? '<span class="tag ok">✓</span>' : '<span class="tag def">✗</span>';
    return `<tr class="${i===sel?'sel-row':!isR?'proj-row':''}">
      <td style="font-weight:${i===sel?500:400}">${m}</td>
      <td style="text-align:right;color:var(--green)">${fmt(D.ingresos[i])}</td>
      <td style="text-align:right;color:var(--red)">${fmt(D.gastos[i])}</td>
      <td style="text-align:right;color:${net>=0?'var(--green)':'var(--red)'}">${fmtS(net)}</td>
      <td style="text-align:center">${tag}</td>
    </tr>`;
  }).join('');
  document.getElementById('resumen').innerHTML = `
    <table class="res-table">
      <thead><tr><th>Month</th><th style="text-align:right">Income</th><th style="text-align:right">Spending</th><th style="text-align:right">Net</th><th style="text-align:center">Status</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

loadData();
</script>
</body>
</html>
